services:
  postgres:
    image: postgres:16-alpine
    container_name: ropejumping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ropejumping
      POSTGRES_USER: ropejumping
      POSTGRES_PASSWORD: ropejumping
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ropejumping -d ropejumping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
